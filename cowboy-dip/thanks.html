<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Sent — Cowboy Dip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Passion+One:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #3d2b1f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
        }
        .emoji-big { font-size: 5rem; margin-bottom: 20px; }
        h1 { font-family: 'Passion One', cursive; font-size: 3rem; color: #f5c842; margin-bottom: 12px; }
        p { color: #d4bfa0; font-size: 1.1rem; line-height: 1.7; max-width: 440px; }
        a { color: #f5c842; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn {
            display: inline-block;
            margin-top: 32px;
            padding: 14px 36px;
            background: #f5c842;
            color: #3d2b1f;
            border-radius: 100px;
            font-weight: 800;
            text-decoration: none;
            font-size: 1rem;
            transition: all .2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,200,66,.3); }
    </style>
</head>
<body>
    <div class="emoji-big">🤠</div>
    <h1>Order Sent!</h1>
    <p>We got your Cowboy Dip request. We'll reach out to confirm your pickup time. See you soon! 🌮🔥</p>
    <a href="./" class="btn">⬅ Back to Cowboy Dip</a>
</body>
</html>
